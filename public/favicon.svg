  <rect x="19" y="20" width="9" height="28" rx="2" fill="#E8E8E2"/>
  <rect x="30" y="20" width="9" height="28" rx="2" fill="#E8E8E2"/>
  <rect x="41" y="20" width="9" height="28" rx="2" fill="#E8E8E2"/>
  <rect x="52" y="20" width="4" height="28" rx="2" fill="#E8E8E2"/>
